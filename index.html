<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mars Rover — Save the Earth</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="game-container">
    <header id="hud">
      <div class="hud-section">
        <span class="hud-label">LIVES</span>
        <span id="lives-display">♥ ♥ ♥</span>
      </div>
      <div class="hud-section">
        <span class="hud-label">LEVEL</span>
        <span id="level-display">1</span>
      </div>
      <div class="hud-section collectibles">
        <span class="collect-item" title="Minerals">⛏ <span id="minerals-count">0</span>/<span id="minerals-goal">3</span></span>
        <span class="collect-item" title="Microbes">🦠 <span id="microbes-count">0</span>/<span id="microbes-goal">0</span></span>
        <span class="collect-item" title="Water">💧 <span id="water-count">0</span>/<span id="water-goal">0</span></span>
      </div>
    </header>

    <canvas id="game-canvas" width="800" height="480"></canvas>

    <div id="overlay" class="overlay visible">
      <div id="overlay-content">
        <h1>MARS ROVER</h1>
        <p class="subtitle">Collect elements. Save the Earth.</p>
        <p class="story">
          You're a Mars rover on the red planet. Gather <strong>minerals</strong>,
          <strong>microbes</strong>, and <strong>water</strong> to bring back to Earth —
          but watch out for craters, hostile aliens, and falling asteroids!
        </p>
        <div class="controls-hint">
          <kbd>←</kbd> <kbd>→</kbd> Move &nbsp;·&nbsp; <kbd>↑</kbd> or <kbd>Space</kbd> Jump
        </div>
        <button id="start-btn" class="game-btn">START MISSION</button>
      </div>
    </div>
  </div>

  <script src="levels.js"></script>
  <script src="game.js"></script>
</body>
</html>
